name: Release with Changelog

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Select version bump"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Create version file if missing
        run: |
          if [ ! -f version.txt ]; then
            echo "0.0.0" > version.txt
          fi

      - name: Read current version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          VERSION=${{ steps.version.outputs.current }}
          TYPE=${{ github.event.inputs.version_type }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR+1))
            PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo $NEW_VERSION > version.txt
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          echo "## v${{ steps.bump.outputs.new_version }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit files
        run: |
          git add version.txt CHANGELOG.md
          git commit -m "Release v${{ steps.bump.outputs.new_version }}"

      - name: Create release branch
        run: |
          BRANCH="release_v${{ steps.bump.outputs.new_version }}"
          git checkout -b $BRANCH
          git push origin $BRANCH