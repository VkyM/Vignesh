name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Ensure version file exists
        run: |
          if [ ! -f version.txt ]; then
            echo "0.0.0" > version.txt
          fi

      - name: Read current version
        id: current
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: bump
        run: |
          VERSION=${{ steps.current.outputs.version }}
          TYPE=${{ github.event.inputs.version_type }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR+1))
            PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          BRANCH="release_v${{ steps.bump.outputs.new_version }}"
          git checkout -b $BRANCH

      - name: Update version file in release branch
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > version.txt

      - name: Generate changelog
        run: |
          echo "## v${{ steps.bump.outputs.new_version }} - $(date)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s" -n 10 >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit release files
        run: |
          git add version.txt CHANGELOG.md
          git commit -m "Release v${{ steps.bump.outputs.new_version }}"

      - name: Push release branch
        run: |
          git push origin HEAD