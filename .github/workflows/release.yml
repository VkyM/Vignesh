name: Sprint Release Workflow

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump for release"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      # ✅ Checkout current sprint branch
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # ✅ Get current branch
      - name: Get current branch
        id: branch
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # ✅ Calculate sprint info
      - name: Calculate sprint info
        id: sprint
        run: |
          CURRENT=${{ steps.branch.outputs.branch }}
          NUM=$(echo $CURRENT | grep -o '[0-9]*')

          PREV_NUM=$((NUM - 1))
          NEXT_NUM=$((NUM + 1))

          if [ "$PREV_NUM" -le 0 ]; then
            PREV_BRANCH="main"
          else
            PREV_BRANCH="sprint$PREV_NUM"
          fi

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "previous=$PREV_BRANCH" >> $GITHUB_OUTPUT
          echo "next=sprint$NEXT_NUM" >> $GITHUB_OUTPUT

      # ✅ Ensure version file exists
      - name: Ensure version file
        run: |
          if [ ! -f version.txt ]; then
            echo "1.0.0" > version.txt
          fi

      # ✅ Read current version
      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ✅ Bump version (THIS is used for release)
      - name: Bump version
        id: bump
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TYPE=${{ github.event.inputs.version_type }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR+1))
            PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "next_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ✅ Fetch all branches
      - name: Fetch all branches
        run: git fetch --all

      # ✅ Generate changelog (ONLY current sprint commits + author)
      - name: Generate changelog
        run: |
          CURRENT=${{ steps.sprint.outputs.current }}
          PREV=${{ steps.sprint.outputs.previous }}
          VERSION=${{ steps.bump.outputs.next_version }}

          echo "## Release v$VERSION - $(date)" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if git show-ref --verify --quiet refs/remotes/origin/$PREV; then
            echo "Comparing $PREV -> $CURRENT"
            git log origin/$PREV..HEAD \
              --pretty=format:"- %s (%an)" \
              >> CHANGELOG.md
          else
            echo "Previous sprint not found, using full history"
            git log --pretty=format:"- %s (%an)" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md

      # ✅ Create release branch with NEW version
      - name: Create release branch
        run: |
          VERSION=${{ steps.bump.outputs.next_version }}
          RELEASE="release-v$VERSION"

          if git ls-remote --exit-code --heads origin $RELEASE; then
            echo "Release branch already exists, exiting"
            exit 1
          fi

          git checkout -b $RELEASE

      # ✅ Update version.txt in release branch
      - name: Update version in release branch
        run: |
          echo "${{ steps.bump.outputs.next_version }}" > version.txt
          git add version.txt CHANGELOG.md
          git commit -m "Release v${{ steps.bump.outputs.next_version }}"

      - name: Push release branch
        run: git push origin HEAD

      # ✅ Create next sprint branch (SAFE)
      - name: Create next sprint
        run: |
          git checkout ${{ steps.sprint.outputs.current }}
          NEXT=${{ steps.sprint.outputs.next }}

          if git ls-remote --exit-code --heads origin $NEXT; then
            echo "$NEXT already exists, skipping creation"
            exit 0
          fi

          git checkout -b $NEXT

      # ✅ Update version.txt in next sprint
      - name: Update version for next sprint
        run: |
          echo "${{ steps.bump.outputs.next_version }}" > version.txt
          git add version.txt
          git commit -m "Start ${{ steps.sprint.outputs.next }} with version ${{ steps.bump.outputs.next_version }}"

      - name: Push next sprint
        run: git push origin HEAD
